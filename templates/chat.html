<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Chatbot</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <div class="chat-container">

    <!-- HEADER -->

    <div class="chat-header">

      <div>
        <h2>Aryan chatbot</h2>
        <p>I can make mistake</p>
      </div>

      <!-- SETTINGS -->

      <div class="setting">

        <button class="setting-btn" onclick="toggleMenu()">

          <img
            src="{{ url_for('static', filename='setting.png') }}"
            alt="setting"
          >

        </button>

        <!-- DROPDOWN -->

        <div class="setting-menu" id="settingMenu">

          <button onclick="setTheme('dark')">
            🌙 Dark Theme
          </button>

          <button onclick="setTheme('light')">
            ☀️ Light Theme
          </button>

          <button onclick="clearChat()">
            🗑️ Clear Chat
          </button>

        </div>

      </div>

    </div>

    <!-- CHAT BOX -->

    <div class="chat-box" id="chat-box">

      <div class="bot-message">
        Hello! How can I assist you today?
      </div>

    </div>

    <!-- INPUT AREA -->

    <div class="chat-input">

      <input
        type="text"
        id="user-input"
        placeholder="Type your message..."
      >

      <!-- MIC BUTTON -->

      <button onclick="voiceInput()" class="voice">

        <img
          src="{{ url_for('static', filename='mike.png') }}"
          alt="mic"
          width="22"
          height="22"
        >

      </button>

      <!-- SEND BUTTON -->

      <button onclick="sendMessage()" class="send">
        Send
      </button>

    </div>

  </div>

  <!-- JAVASCRIPT -->

  <script>

    function toggleMenu(){

      let menu =
        document.getElementById("settingMenu");

      if(menu.style.display === "block"){

        menu.style.display = "none";
      }

      else{

        menu.style.display = "block";
      }
    }

    /* THEME */

    function setTheme(theme){

      if(theme === "dark"){

        document.body.style.background =
          "#1e1e1e";
      }

      else if(theme === "light"){

        document.body.style.background =
          "#ececec";
      }

      else if(theme === "green"){

        document.body.style.background =
          "#dff5e1";
      }
    }

    /* EDIT NAME */

    function editName(){

      let newName =
        prompt("Enter chatbot name:");

      if(newName){

        document.querySelector(
          ".chat-header h2"
        ).innerText = newName;
      }
    }

    /* CLEAR CHAT */

    function clearChat(){

      let chatBox =
        document.getElementById("chat-box");

      chatBox.innerHTML = "";
    }

    /* VOICE INPUT */

    function voiceInput(){

      const recognition = new (
        window.SpeechRecognition ||
        window.webkitSpeechRecognition
      )();

      recognition.lang = "en-US";

      recognition.start();

      recognition.onresult = function(event){

        const transcript =
          event.results[0][0].transcript;

        document.getElementById(
          "user-input"
        ).value = transcript;
      };

      recognition.onerror = function(event){

        console.error(
          "Speech recognition error:",
          event.error
        );
      };
    }

    /* SEND MESSAGE */

    function sendMessage(){

      const input =
        document.getElementById("user-input");

      const chatBox =
        document.getElementById("chat-box");

      const message =
        input.value.trim();

      if(message === "") return;

      /* USER MESSAGE */

      const userMsg =
        document.createElement("div");

      userMsg.className =
        "user-message";

      userMsg.textContent =
        message;

      chatBox.appendChild(userMsg);

      /* SEND TO FLASK */

      fetch("/chat",{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          message:message
        })

      })

      .then(res => res.json())

      .then(data => {

        const botMsg =
          document.createElement("div");

        botMsg.className =
          "bot-message";

        botMsg.textContent =
          data.response;

        chatBox.appendChild(botMsg);

        chatBox.scrollTop =
          chatBox.scrollHeight;
      })

      .catch(error => console.error(error));

      input.value = "";
    }

  </script>

</body>
</html>
