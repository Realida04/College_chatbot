<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Chatbot</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>

  <div class="chat-container">
    
    <div class="chat-header">
      <h2>Aryan College Chatbot 🤖</h2>
      <p>I can make mistake !</p>
      <p></p>
    </div>

    <div class="chat-box" id="chat-box">
      <div class="bot-message">Hello! How can I help you today?</div>
    </div>

    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type your message...">
      <button onClick = "voiceInput()" class="voice"><img src="{{ url_for('static', filename='mike.png') }}" alt="mic" height="25x" width="25px"></button>
      <button onclick="sendMessage()" class="send">Send</button>
      
    </div>

  </div>

  <script>

    function voiceInput() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = 'en-US';

  recognition.start();

  recognition.onresult = function(event) {
    const transcript = event.results[0][0].transcript;

    // Put text in input box
    document.getElementById("user-input").value = transcript;

    // Directly send message to chat
    // sendMessage();
  };

  recognition.onerror = function(event) {
    console.error("Speech recognition error:", event.error);
  };
}
    function sendMessage() {
      const input = document.getElementById("user-input");
      const chatBox = document.getElementById("chat-box");

      const message = input.value.trim();
      if (message === "") return;

      // Show user message
      const userMsg = document.createElement("div");
      userMsg.className = "user-message";
      userMsg.textContent = message;
      chatBox.appendChild(userMsg);

      // Send message to Flask backend
      fetch("/chat", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({ message: message })
})
.then(res => res.json())
.then(data => {
  const botMsg = document.createElement("div");
  botMsg.className = "bot-message";
  botMsg.textContent = data.response;
  chatBox.appendChild(botMsg);
})
.catch(error => console.error(error));

      // Clear input AFTER sending
      input.value = "";
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>

</body>
</html>
