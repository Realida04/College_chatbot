<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Chatbot</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>

  <div class="chat-container">
    
    <div class="chat-header">
      <h2>College Chatbot 🤖</h2>
      <p>Ask anything about admissions, courses, or campus life</p>
    </div>

    <div class="chat-box" id="chat-box">
      <div class="bot-message">Hello! How can I help you today?</div>
    </div>

    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type your message...">
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById("user-input");
      const chatBox = document.getElementById("chat-box");

      const message = input.value.trim();
      if (message === "") return;

      // user message
      const userMsg = document.createElement("div");
      userMsg.className = "user-message";
      userMsg.textContent = message;
      chatBox.appendChild(userMsg);

      // simple bot reply (placeholder logic)
      const botMsg = document.createElement("div");
      botMsg.className = "bot-message";
    //   botMsg.textContent = "Thanks for your question! Our team will get back to you.";
      chatBox.appendChild(botMsg);

      input.value = "";
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>

</body>
</html>
